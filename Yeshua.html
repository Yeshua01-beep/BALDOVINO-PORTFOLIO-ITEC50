<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #330000, #0a0000);
}
.card {
  width: 330px;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255, 0, 0, 0.08);
  backdrop-filter: blur(10px);
  border: 2px solid gold;
  box-shadow:
    0 0 20px red,
    0 0 40px rgba(255, 0, 0, 0.5),
    inset 0 0 10px gold;
  color: #fff;
}
.nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}
.nav button {
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  background: linear-gradient(45deg, gold, orange);
  color: black;
  font-weight: bold;
  box-shadow: 0 0 10px gold;
}
.nav button:hover {
  background: linear-gradient(45deg, red, darkred);
  color: white;
  box-shadow: 0 0 15px red;
}
h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}
.profile {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin: 10px;
  object-fit: cover;
  border: 3px solid cyan;
  box-shadow:
    0 0 20px cyan,
    0 0 40px cyan,
    inset 0 0 15px cyan;
}
.box-img {
  width: 90px;
  height: 90px;
  margin: 10px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid gold;
  box-shadow:
    0 0 10px gold,
    0 0 20px red;
}
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
.info {
  text-align: left;
  font-size: 13px;
}
.section {
  display: none;
}
.active {
  display: block;
}
.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #ccc;
  border-top: 1px solid rgba(255,215,0,0.3);
  padding-top: 10px;
}
</style>
</head>
<body>
<div class="card">
  <!-- NAVIGATION -->
  <div class="nav">
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('about')">About</button>
    <button onclick="showSection('quizzes')">Quizzes</button>
    <button onclick="showSection('lab')">Lab</button>
    <button onclick="showSection('exam')">Exam</button>
  </div>
  <!-- HOME -->
  <div id="home" class="section active">
    <h1>Portfolio</h1>
    <img src="Messenger_creation_CDD11B4C-FFEA-4BEC-AD8D-65BA0D87F648.jpeg
" class="profile">
    <div class="info">
      <p><b>Name:</b> Baldovino Yeshua Ely T.</p>
      <p><b>Course:</b> Bachelor of Science in Computer Science</p>
      <p><b>Section:</b> 1A</p>
    </div>
  </div>
  <!-- ABOUT -->
  <div id="about" class="section">
    <h1>About Me</h1>
    <p>
      I do like playing online games and watching movies,
      especially Marvel Cinematic Universe (MCU).
    </p>
  </div>
  <!-- QUIZZES -->
  <div id="quizzes" class="section">
    <h1>Quizzes</h1>
    <div class="gallery">
      <img src="quiz1.jpg" class="box-img" alt="Quiz 1">
      <img src="Messenger_creation_332AB42F-C3BF-4C0A-853A-046D41C26D33.jpeg" class="box-img" alt="Quiz 2">
      <img src="IMG_20260607_062825.jpg" class="box-img" alt="Quiz 3">
    </div>
  </div>
  <!-- LAB ACTIVITIES -->
  <div id="lab" class="section">
    <h1>Lab Activities</h1>
    <div class="gallery">
      <img src="IMG_20260607_062800.jpg" class="box-img" alt="">
      <img src="IMG_20260607_062815.jpg" class="box-img" alt="">
      <img src="lab3.jpg" class="box-img" alt="">
    </div>
  </div>
  <!-- EXAMS -->
  <div id="exam" class="section">
    <h1>Exams</h1>
    <div class="gallery">
      <img src="IMG_20260607_062748.jpg" class="box-img" alt="Midterm Exam">
      <img src="final.jpg" class="box-img" alt="Final Exam">
    </div>
  </div>
  <!-- FOOTER -->
  <div class="footer">
    <p>© yeshuaely.baldovino@cvsu.edu.ph</p>
  </div>
</div>
<script>
function showSection(id) {
  let sections = document.querySelectorAll('.section');
  sections.forEach(section => {
    section.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
